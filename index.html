<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Formula Fusion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400..900&family=Viaoda+Libre&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="calc.css">
  <link rel="manifest " href="manifest.json">

</head>

<body>
  <div class="container">
   <div class="heading">
    <p class="the">The</p>
      <h1>Formula Fusion</h1>
      </div>
 
  <canvas id="math-bg"></canvas>
  <div class="bg-blur"></div>
  <div class="glow glow-purple"></div>
  <div class="glow glow-pink"></div>
  <div class="glow glow-teal"></div>

  <div class="calculator">
    <div class="display">
      <div class="expr" id="expr"></div>
      <div class="result" id="result">0</div>
    </div>

   


    <div class="buttons">
  
      <!-- Row 1 -->
      <button class="btn util" onclick="clearAll()">AC</button>
      <button class="btn util" onclick="toggleSign()">+/−</button>
      <button class="btn util" onclick="percent()">%</button>
      <button class="btn op"  onclick="setOp('/')">÷</button>

      <!-- Row 2 -->
      <button class="btn num" onclick="pressNum('7')">7</button>
      <button class="btn num" onclick="pressNum('8')">8</button>
      <button class="btn num" onclick="pressNum('9')">9</button>
      <button class="btn op"  onclick="setOp('*')">×</button>

      <!-- Row 3 -->
      <button class="btn num" onclick="pressNum('4')">4</button>
      <button class="btn num" onclick="pressNum('5')">5</button>
      <button class="btn num" onclick="pressNum('6')">6</button>
      <button class="btn op"  onclick="setOp('-')">−</button>

      <!-- Row 4 -->
      <button class="btn num" onclick="pressNum('1')">1</button>
      <button class="btn num" onclick="pressNum('2')">2</button>
      <button class="btn num" onclick="pressNum('3')">3</button>
      <button class="btn op"  onclick="setOp('+')">+</button>

      <!-- Row 5 -->
      <button class="btn num zero" onclick="pressNum('0')">0</button>
      <button class="btn num"      onclick="pressDot()">.</button>
      <button class="btn eq"       onclick="calculate()">=</button>
    </div>
  </div>
  </div>

 
</body>
<script src="calc.js"></script>

</html>
